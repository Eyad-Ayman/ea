  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, child, update, remove } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC_RfEl18oycTKbwTP8DkdltZimeQWwyAo",
      authDomain: "eyadmariam-70ed5.firebaseapp.com",
      databaseURL: "https://eyadmariam-70ed5-default-rtdb.firebaseio.com",
      projectId: "eyadmariam-70ed5",
      storageBucket: "eyadmariam-70ed5.appspot.com",
      messagingSenderId: "135147139312",
      appId: "1:135147139312:web:7a0bce5c04d19a22099235",
      measurementId: "G-7QK913E5FY"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notesRef = ref(db, 'notes');

    window.saveNote = () => {
      const userName = document.querySelector('input[name="userName"]:checked').value;
      const text = document.getElementById("loveNote").value;
      const image = document.getElementById("uploadedImage").src;
      const hasImage = document.getElementById("uploadedImage").style.display !== "none";

      if (!text.trim()) {
        alert("من فضلك اكتب شيئًا قبل الحفظ");
        return;
      }

      const note = {
        user: userName,
        text,
        timestamp: new Date().toISOString(),
        image: hasImage ? image : null,
        comments: [],
        likes: 0
      };

      push(notesRef, note);
      document.getElementById("loveNote").value = "";
      document.getElementById("uploadedImage").style.display = "none";
    };

    window.previewImage = (event) => {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = document.getElementById("uploadedImage");
          img.src = e.target.result;
          img.style.display = "block";
        };
        reader.readAsDataURL(file);
      }
    };

    function loadNotes() {
      onValue(notesRef, (snapshot) => {
        const data = snapshot.val();
        const feed = document.getElementById("notesFeed");
        feed.innerHTML = "";
        if (data) {
          Object.entries(data).reverse().forEach(([key, note]) => {
            const noteDiv = document.createElement("div");
            noteDiv.className = "note-item glassy-card";
            noteDiv.innerHTML = `
              <div class="note-header">
                <img class="story-thumb" src="${note.user === 'Eyad' ? 'https://i.imgur.com/Yg6uBKW.png' : 'https://i.imgur.com/gUdU2Tx.png'}" alt="avatar">
                <div>
                  <div class="note-user">${note.user}</div>
                  <div class="note-time">${new Date(note.timestamp).toLocaleString()}</div>
                </div>
                <i class="fas fa-trash delete-note" data-id="${key}" title="حذف"></i>
              </div>
              <div class="note-text">${note.text}</div>
              ${note.image ? `<img src="${note.image}" class="note-img">` : ''}
              <div class="note-reactions">
                <i class="fas fa-heart" data-id="${key}" onclick="toggleLike(this)"></i>
                <span class="like-count">${note.likes || 0}</span>
                <i class="fas fa-comment" onclick="toggleCommentSection(this)"></i>
              </div>
              <div class="comment-section" style="display:none;">
                <input type="text" placeholder="أضف تعليق..." class="comment-input">
                <button class="comment-btn" data-id="${key}">نشر</button>
                <div class="comments">
                  ${(note.comments || []).map(c => `<div class="comment"><strong>${c.user}:</strong> ${c.text}</div>`).join('')}
                </div>
              </div>
            `;
            feed.appendChild(noteDiv);
          });

          document.querySelectorAll('.comment-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              const noteId = btn.getAttribute('data-id');
              const input = btn.previousElementSibling;
              const commentText = input.value;
              const user = document.querySelector('input[name="userName"]:checked').value;
              if (!commentText.trim()) return;
              const comment = { user, text: commentText };
              const commentRef = child(notesRef, noteId);
              onValue(commentRef, (snap) => {
                const oldComments = snap.val().comments || [];
                update(commentRef, {
                  comments: [...oldComments, comment]
                });
              }, { onlyOnce: true });
              input.value = "";
            });
          });

          document.querySelectorAll('.delete-note').forEach(icon => {
            icon.addEventListener('click', () => {
              const noteId = icon.getAttribute('data-id');
              if (confirm("هل أنت متأكد أنك تريد حذف هذه الملاحظة؟")) {
                const noteRef = child(notesRef, noteId);
                remove(noteRef);
              }
            });
          });
        } else {
          feed.innerHTML = '<div class="no-notes">لا توجد ملاحظات بعد</div>';
        }
      });
    }

    window.toggleLike = (icon) => {
      const noteId = icon.getAttribute('data-id');
      const countSpan = icon.nextElementSibling;
      const noteRef = child(notesRef, noteId);
      onValue(noteRef, (snap) => {
        let currentLikes = snap.val().likes || 0;
        currentLikes++;
        update(noteRef, { likes: currentLikes });
        countSpan.textContent = currentLikes;
        icon.classList.add('liked');
      }, { onlyOnce: true });
    }

    window.toggleCommentSection = (icon) => {
      const section = icon.closest('.note-item').querySelector('.comment-section');
      section.style.display = section.style.display === 'none' ? 'block' : 'none';
    }

    loadNotes();
  </script>

  <script>
    let currentSection = 'main';
    function showSection(name) {
      document.getElementById('eyadSection').classList.add('hidden');
      document.getElementById('mariamSection').classList.add('hidden');
      document.getElementById(name + 'Section').classList.remove('hidden');
      document.getElementById('backButton').style.display = 'inline-block';
      currentSection = name;
    }
    function backToMain() {
      document.getElementById('eyadSection').classList.add('hidden');
      document.getElementById('mariamSection').classList.add('hidden');
      document.getElementById('backButton').style.display = 'none';
      currentSection = 'main';
    }
    document.getElementById("eyadNote").addEventListener("input", function() {
      document.getElementById("eyadPreview").innerText = this.value;
    });
    document.getElementById("mariamNote").addEventListener("input", function() {
      document.getElementById("mariamPreview").innerText = this.value;
    });
    function showFullscreen(url) {
      document.getElementById("fullscreenImage").src = url;
      document.getElementById("fullscreenViewer").style.display = "flex";
    }
    function hideFullscreen() {
      document.getElementById("fullscreenViewer").style.display = "none";
    }
    function uploadImage(event) {
      const file = event.target.files[0];
      const storageRef = firebase.storage().ref('images/' + file.name);
      storageRef.put(file).then(() => {
        storageRef.getDownloadURL().then((url) => {
          const img = document.createElement('img');
          img.src = url;
          img.onclick = () => showFullscreen(url);
          document.getElementById('gallery').appendChild(img);
          const timeline = document.getElementById("timeline");
          const block = document.createElement("div");
          const now = new Date().toLocaleDateString('ar-EG');
          block.innerHTML = `<div style="margin-bottom:10px;font-size:13px;color:#555">📅 ${now}</div><img src="${url}" style="width:100%;border-radius:8px;margin-top:5px;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer" onclick="showFullscreen('${url}')" />`;
          timeline.prepend(block);
        });
      });
    }
    let mediaRecorder;
    let audioChunks = [];
    function startRecording(who) {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();
        audioChunks = [];
        mediaRecorder.addEventListener('dataavailable', event => {
          audioChunks.push(event.data);
        });
        mediaRecorder.addEventListener('stop', () => {
          const audioBlob = new Blob(audioChunks);
          const audioURL = URL.createObjectURL(audioBlob);
          document.getElementById('player' + (who === 'eyad' ? 'Eyad' : 'Mariam')).src = audioURL;
        });
      });
    }
    function stopRecording() {
      if (mediaRecorder) {
        mediaRecorder.stop();
      }
    }
    function updateDaysCount() {
      const startDate = new Date("2024-11-23");
      const today = new Date();
      const diff = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
      document.getElementById("daysCount").textContent = diff;
    }
    updateDaysCount();
    setInterval(updateDaysCount, 86400000);
  </script>
