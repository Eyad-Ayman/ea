<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYAD & MARIAM - One-Time Access</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #ff2d6e, #b388ff);
            color: white;
            text-align: center;
            padding: 0;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
        }
        .hidden {
            display: none;
        }
        #blockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <!-- المحتوى الرئيسي -->
    <div class="container" id="mainContent">
        <h1>EYAD & MARIAM 💖</h1>
        <p>مرحبًا! هذه الزيارة الوحيدة المسموح بها.</p>
    </div>

    <!-- شاشة المنع -->
    <div id="blockScreen" class="hidden">
        <h2>⛔ الوصول ممنوع!</h2>
        <p>لا يمكنك تحديث الصفحة أو إعادة فتحها.</p>
        <p>يجب الدخول عبر الرابط الأصلي.</p>
    </div>

    <script>
        // تحقق من وجود علامة في الرابط
        function checkAccess() {
            const url = new URL(window.location.href);
            const hasToken = url.searchParams.has('token');

            // إذا كان الرابط يحتوي على Token (الزيارة الأولى)
            if (hasToken) {
                // أضف علامة في localStorage لمنع إعادة الدخول
                localStorage.setItem('visited', 'true');
                // أزل الـ Token من الرابط لمنع المشاركة
                url.searchParams.delete('token');
                window.history.replaceState({}, '', url);
            } 
            // إذا تم التحديث أو إعادة الفتح
            else if (localStorage.getItem('visited')) {
                showBlockScreen();
            }
        }

        function showBlockScreen() {
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('blockScreen').classList.remove('hidden');
            
            // منع أي تفاعل مع الصفحة
            document.body.style.pointerEvents = 'none';
        }

        // عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', checkAccess);
    </script>
</body>
</html>
