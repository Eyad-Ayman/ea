<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYAD & MARIAM - One-Time Access</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #ff2d6e, #b388ff);
            color: white;
            text-align: center;
            padding: 0;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .hidden {
            display: none;
        }
        #blockMessage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <!-- المحتوى الرئيسي -->
    <div class="container" id="mainContent">
        <h1>EYAD & MARIAM 💖</h1>
        <p>مرحبًا! هذه الزيارة الوحيدة المسموح بها لك.</p>
        <p>سيتم منع أي محاولة لتحديث الصفحة.</p>
    </div>

    <!-- رسالة المنع -->
    <div id="blockMessage" class="hidden">
        <h2>❌ تم منع الوصول!</h2>
        <p>هذه الصفحة لا تسمح بالتحديث أو إعادة الفتح.</p>
        <p>يجب فتحها من جديد عبر الرابط الأصلي.</p>
    </div>

    <script>
        // تحقق مما إذا كانت هذه أول زيارة
        function checkFirstVisit() {
            const isFirstVisit = !sessionStorage.getItem('visited');
            
            if (isFirstVisit) {
                sessionStorage.setItem('visited', 'true');
                localStorage.setItem('allow_access', 'true');
            } else {
                localStorage.removeItem('allow_access');
                showBlockMessage();
            }
        }

        // منع التحديث باستخدام localStorage
        function preventRefresh() {
            if (!localStorage.getItem('allow_access')) {
                showBlockMessage();
            }
        }

        // عرض رسالة المنع
        function showBlockMessage() {
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('blockMessage').classList.remove('hidden');
            
            // منع أي تفاعل مع الصفحة
            document.body.style.pointerEvents = 'none';
        }

        // منع حدث التحديث
        window.addEventListener('beforeunload', function(e) {
            localStorage.removeItem('allow_access');
            sessionStorage.removeItem('visited');
        });

        // عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            checkFirstVisit();
            preventRefresh();
        });
    </script>
</body>
</html>
